<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeeFlow</title>

    <meta name="theme-color" content="#5DADE2">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

    <header class="header">

        <div class="logo">
            £
        </div>

     <h1>FeeFlow</h1>

<p class="version">
    v0.2 Alpha
</p>

<p id="greeting">
    Good Morning Adam 👋
</p>

    </header>

    <main>

        <section class="card">

            <h2>Calculation Regime</h2>

            <div class="regime">

                <label>
                    <input
                        type="radio"
                        name="regime"
                        value="pre"
                        checked>
                    Pre May
                </label>

                <label>
                    <input
                        type="radio"
                        name="regime"
                        value="post">
                    Post May
                </label>

            </div>

        </section>

        <section class="card">

            <h2>Balance</h2>

            <input
                id="balance"
                type="number"
                step="0.01"
                placeholder="£0.00">

        </section>

        <section class="buttons">

            <button id="calculateButton">
                Calculate Fee
            </button>

            <button id="resetButton">
                Reset
            </button>

        </section>

        <section id="results" class="card hidden">

            <h2>Results</h2>

            <div class="resultItem">

                <span>Enforcement Fee</span>

                <strong id="enforcementFee">
                    £0.00
                </strong>

            </div>

            <div class="resultItem">

                <span>New Balance</span>

                <strong id="newBalance">
                    £0.00
                </strong>

            </div>

            <button id="breakdownButton">
                Show Breakdown
            </button>

            <button id="copyButton">
                Copy Summary
            </button>

        </section>
<section id="repaymentCard" class="card hidden">

    <h2>Repayment Negotiation</h2>

    <label for="deposit">
        Deposit Today (£)
    </label>

    <input
        id="deposit"
        type="number"
        step="0.01"
        placeholder="0.00">

    <div class="repaymentResults">

        <div class="resultItem">
            <span>3 Months</span>
            <strong id="plan3">£0.00</strong>
        </div>

        <div class="resultItem">
            <span>⭐ 6 Months</span>
            <strong id="plan6">£0.00</strong>
        </div>

        <div class="resultItem">
            <span>12 Months</span>
            <strong id="plan12">£0.00</strong>
        </div>

    </div>

</section>
        <section class="card">

    <h2>Recent Calculations</h2>

    <div id="recentList">

        <p>No calculations yet.</p>

    </div>

</section>
    </main>

</div>
<div id="breakdownModal" class="modal hidden">

    <div class="modalContent">

        <h2>Fee Breakdown</h2>

        <pre id="breakdownText"></pre>

        <button id="closeBreakdown">
            Close
        </button>

    </div>

</div>
<script src="app.js"></script>

</body>
</html>
